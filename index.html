<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Мини-игра: Надувай и лопай</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#111827;
      --panel: rgba(255,255,255,.12);
      --text:#ffffff;
      --accent:#22c55e;
      --danger:#ef4444;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, var(--bg1), var(--bg2));
      color:var(--text);
      user-select:none;
      touch-action:none;
    }

    #hud{
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:64px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,.42), rgba(0,0,0,.12));
      backdrop-filter: blur(8px);
      z-index:20;
    }

    #stats{
      flex:1;
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:12px;
      font-weight:700;
      text-shadow: 0 2px 8px rgba(0,0,0,.35);
    }

    .pill{
      padding:8px 12px;
      border-radius:999px;
      background: var(--panel);
      box-shadow: var(--shadow);
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:14px;
      white-space:nowrap;
    }

    .btn{
      border:0;
      border-radius:12px;
      padding:10px 14px;
      background: rgba(255,255,255,.14);
      color: white;
      font-weight:700;
      box-shadow: var(--shadow);
      cursor:pointer;
    }
    .btn:active{ transform: translateY(1px) scale(.99); }

    #game{
      position:fixed;
      inset:64px 0 0 0;
      overflow:hidden;
    }

    .balloon{
      position:absolute;
      border-radius:50% 50% 46% 46%;
      box-shadow: inset -10px -18px 22px rgba(0,0,0,.16), 0 8px 18px rgba(0,0,0,.2);
      transform: translate(-50%, -50%);
      will-change: transform, left, top;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 16px;
      color: rgba(255,255,255,.96);
      text-shadow: 0 1px 3px rgba(0,0,0,.45);
      cursor:pointer;
    }

    .balloon::before{
      content:"";
      position:absolute;
      top:85%;
      left:50%;
      width:2px;
      height:34px;
      background: rgba(255,255,255,.55);
      transform: translateX(-50%);
      filter: blur(.1px);
    }

    .balloon::after{
      content:"";
      position:absolute;
      top:12%;
      left:25%;
      width:18%;
      height:24%;
      border-radius:50%;
      background: rgba(255,255,255,.22);
      transform: rotate(-20deg);
    }

    .bonus-all{
      outline: 3px solid rgba(255,255,255,.9);
      box-shadow: 0 0 0 4px rgba(255,255,255,.12), 0 8px 18px rgba(0,0,0,.2);
    }

    .bonus-life{
      outline: 3px solid gold;
      box-shadow: 0 0 0 4px rgba(255,215,0,.18), 0 8px 18px rgba(0,0,0,.2);
    }

    .burst{
      position:absolute;
      pointer-events:none;
      width:16px;
      height:16px;
      border-radius:50%;
      background: white;
      opacity:.9;
      transform: translate(-50%,-50%) scale(.2);
      animation: pop .35s ease-out forwards;
    }

    @keyframes pop{
      from{ transform: translate(-50%,-50%) scale(.2); opacity:1; }
      to{ transform: translate(-50%,-50%) scale(2.8); opacity:0; }
    }

    #overlay{
      position:fixed;
      inset:64px 0 0 0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,.35);
      z-index:50;
      text-align:center;
      padding:20px;
    }

    #overlay .card{
      width:min(420px, 92vw);
      background: rgba(15,23,42,.82);
      border:1px solid rgba(255,255,255,.15);
      border-radius:24px;
      padding:22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    #overlay h1{
      margin:0 0 10px;
      font-size: 32px;
    }

    #overlay p{
      margin:8px 0;
      line-height:1.5;
      color: rgba(255,255,255,.9);
    }

    #overlay .restart{
      margin-top:14px;
      width:100%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .small{
      font-size:12px;
      opacity:.85;
      font-weight:600;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="stats">
      <div class="pill">Очки: <span id="score">0</span></div>
      <div class="pill">Жизни: <span id="lives">5</span></div>
      <div class="pill">Пропущено: <span id="missed">0</span>/5</div>
      <div class="pill">Скорость: <span id="speed">1.0</span>x</div>
    </div>
    <button class="btn" id="pauseBtn">Пауза</button>
    <button class="btn" id="bgBtn">Фон</button>
    <button class="btn" id="paletteBtn">Палитра</button>
  </div>

  <div id="game"></div>

  <div id="overlay">
    <div class="card">
      <h1>Игра окончена</h1>
      <p>Ты пропустил слишком много шариков.</p>
      <p>Финальный счёт: <strong id="finalScore">0</strong></p>
      <button class="btn restart" id="restartBtn">Играть снова</button>
      <p class="small">Нажимай на шарики, чтобы лопать их. Бонусные шарики дают особые эффекты.</p>
    </div>
  </div>

  <script>
    const game = document.getElementById('game');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const missedEl = document.getElementById('missed');
    const speedEl = document.getElementById('speed');
    const pauseBtn = document.getElementById('pauseBtn');
    const bgBtn = document.getElementById('bgBtn');
    const paletteBtn = document.getElementById('paletteBtn');
    const overlay = document.getElementById('overlay');
    const finalScore = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restartBtn');

    let score = 0;
    let lives = 5;
    let missed = 0;
    let paused = false;
    let lastTime = performance.now();
    let spawnTimer = 0;
    let balloons = [];
    let balloonId = 0;

    const bgThemes = [
      ['#0f172a', '#111827'],
      ['#0b1020', '#1f2937'],
      ['#111827', '#1e3a8a'],
      ['#1b1035', '#2e1065'],
      ['#052e16', '#064e3b'],
      ['#3b0764', '#111827']
    ];
    let bgIndex = 0;

    let paletteSets = [
      ['#ff5f6d', '#ffc371', '#4ade80', '#60a5fa', '#f472b6', '#f59e0b', '#a78bfa'],
      ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6'],
      ['#fb7185', '#f43f5e', '#ec4899', '#c084fc', '#38bdf8', '#34d399', '#facc15'],
      ['#ff8a65', '#ffd54f', '#81c784', '#4fc3f7', '#ba68c8', '#ff6f91', '#7c4dff']
    ];
    let paletteIndex = 0;
    let currentPalette = paletteSets[0];

    function applyBackground() {
      bgIndex = (bgIndex + 1) % bgThemes.length;
      document.documentElement.style.setProperty('--bg1', bgThemes[bgIndex][0]);
      document.documentElement.style.setProperty('--bg2', bgThemes[bgIndex][1]);
    }

    function applyPalette() {
      paletteIndex = Math.floor(Math.random() * paletteSets.length);
      currentPalette = paletteSets[paletteIndex].slice().sort(() => Math.random() - 0.5);
    }

    function updateHUD() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      missedEl.textContent = missed;
      speedEl.textContent = getSpeed().toFixed(1);
    }

    function getSpeed() {
      return 1 + Math.floor(score / 1000) * 0.15;
    }

    function getSpawnDelay() {
      const base = 1100;
      const reduction = Math.floor(score / 1000) * 35;
      return Math.max(240, base - reduction);
    }

    function colorForScore() {
      const band = Math.floor(score / 1000);
      return currentPalette[band % currentPalette.length];
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createBurst(x, y) {
      const b = document.createElement('div');
      b.className = 'burst';
      b.style.left = x + 'px';
      b.style.top = y + 'px';
      game.appendChild(b);
      setTimeout(() => b.remove(), 360);
    }

    function addLife() {
      lives += 1;
      updateHUD();
    }

    function allPopBonus() {
      const copy = balloons.slice();
      copy.forEach(b => popBalloon(b, true));
    }

    function spawnBalloon() {
      const w = game.clientWidth;
      const h = game.clientHeight;

      const isBonusAll = Math.random() < 0.01;
      const isBonusLife = Math.random() < 0.0001;

      const size = rand(42, 82);
      const x = rand(size, w - size);
      const y = h + size + rand(10, 80);

      const speed = rand(35, 80) * getSpeed();
      const drift = rand(-18, 18);
      const color = isBonusLife ? '#ffd700' : (isBonusAll ? '#ffffff' : colorForScore());

      const balloon = document.createElement('div');
      balloon.className = 'balloon';
      if (isBonusAll) balloon.classList.add('bonus-all');
      if (isBonusLife) balloon.classList.add('bonus-life');

      balloon.style.width = size + 'px';
      balloon.style.height = size * 1.15 + 'px';
      balloon.style.left = x + 'px';
      balloon.style.top = y + 'px';
      balloon.style.background = `linear-gradient(135deg, ${color}, ${shade(color, -18)})`;
      balloon.dataset.id = (++balloonId).toString();

      if (isBonusAll) balloon.textContent = '★';
      else if (isBonusLife) balloon.textContent = '+1';
      else balloon.textContent = '';

      const obj = {
        id: balloonId,
        el: balloon,
        x,
        y,
        size,
        speed,
        drift,
        isBonusAll,
        isBonusLife,
        popped: false,
        spawnAt: performance.now()
      };

      balloon.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        popBalloon(obj);
      });

      balloons.push(obj);
      game.appendChild(balloon);
    }

    function shade(hex, amt) {
      const h = hex.replace('#', '');
      const n = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
      let r = (n >> 16) + amt;
      let g = ((n >> 8) & 255) + amt;
      let b = (n & 255) + amt;
      r = Math.max(0, Math.min(255, r));
      g = Math.max(0, Math.min(255, g));
      b = Math.max(0, Math.min(255, b));
      return `rgb(${r},${g},${b})`;
    }

    function popBalloon(balloon, silent = false) {
      if (!balloon || balloon.popped) return;
      balloon.popped = true;

      const idx = balloons.findIndex(b => b.id === balloon.id);
      if (idx >= 0) balloons.splice(idx, 1);

      const rect = balloon.el.getBoundingClientRect();
      createBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
      balloon.el.remove();

      if (balloon.isBonusAll) {
        allPopBonus();
      } else if (balloon.isBonusLife) {
        addLife();
        score += 50;
      } else {
        score += 10;
      }

      if (!silent) updateHUD();
      checkExtraLifeMilestones();
    }

    let nextLifeMilestone = 10000;
    function checkExtraLifeMilestones() {
      while (score >= nextLifeMilestone) {
        addLife();
        nextLifeMilestone += 10000;
      }
    }

    function gameOver() {
      paused = true;
      finalScore.textContent = score;
      overlay.style.display = 'flex';
      pauseBtn.textContent = 'Пауза';
    }

    function resetGame() {
      balloons.forEach(b => b.el.remove());
      balloons = [];
      score = 0;
      lives = 5;
      missed = 0;
      paused = false;
      lastTime = performance.now();
      spawnTimer = 0;
      nextLifeMilestone = 10000;
      overlay.style.display = 'none';
      updateHUD();
    }

    function tick(now) {
      const dt = Math.min(0.03, (now - lastTime) / 1000);
      lastTime = now;

      if (!paused) {
        spawnTimer += dt * 1000;
        if (spawnTimer >= getSpawnDelay()) {
          spawnTimer = 0;
          spawnBalloon();
          if (Math.random() < 0.18) spawnBalloon();
        }

        const h = game.clientHeight;
        const w = game.clientWidth;
        const currentSpeed = getSpeed();

        for (let i = balloons.length - 1; i >= 0; i--) {
          const b = balloons[i];
          if (b.popped) continue;

          b.y -= b.speed * dt * currentSpeed;
          b.x += b.drift * dt * currentSpeed * 0.9;
          b.drift += Math.sin(now / 700 + b.id) * 0.03;

          if (b.x < b.size / 2) b.x = b.size / 2;
          if (b.x > w - b.size / 2) b.x = w - b.size / 2;

          b.el.style.left = b.x + 'px';
          b.el.style.top = b.y + 'px';

          if (b.y + b.size < 0) {
            b.popped = true;
            b.el.remove();
            balloons.splice(i, 1);
            missed += 1;
            lives -= 1;
            updateHUD();
            if (lives <= 0 || missed >= 5) {
              gameOver();
              break;
            }
          }
        }

        if (score >= Math.floor(score / 1000) * 1000) {
          speedEl.textContent = getSpeed().toFixed(1);
        }
      }

      updateHUD();
      requestAnimationFrame(tick);
    }

    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      pauseBtn.textContent = paused ? 'Продолжить' : 'Пауза';
    });

    bgBtn.addEventListener('click', () => {
      applyBackground();
    });

    paletteBtn.addEventListener('click', () => {
      applyPalette();
    });

    restartBtn.addEventListener('click', () => {
      resetGame();
    });

    // Легкое управление тапом по пустому месту: не мешает игре, но убирает фокус
    game.addEventListener('pointerdown', () => {});

    // Старт
    applyBackground();
    applyPalette();
    updateHUD();
    requestAnimationFrame(tick);

    // Спавн первый шарик сразу
    for (let i = 0; i < 3; i++) spawnBalloon();
  </script>
</body>
</html>
